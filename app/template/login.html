<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Hoja de Vida</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #20ce65;
            --bg-dark: #19232b;
            --bg-deep: #0f171e;
        }

        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-card {
            background: var(--bg-dark);
            padding: 4rem;
            border-radius: 40px;
            border: 1px solid rgba(32, 206, 101, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .eye-branding {
            width: 60px;
            height: 60px;
            margin: 0 auto 2rem;
            background: var(--primary);
            border-radius: 50% 10px;
            transform: rotate(45deg);
            position: relative;
            box-shadow: 0 0 20px rgba(32, 206, 101, 0.3);
        }

        .eye-branding::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: var(--bg-dark);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 3rem;
            color: white;
        }

        .field {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 16px;
            background: #0f171e;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: white;
            font-family: 'Roboto', sans-serif;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .error {
            color: #ff5f5f;
            margin-top: 2rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='img/logo.png') }}" style="width: 120px; height: 120px; margin-bottom: 2rem;">
        <h1>Hoja de Vida</h1>




        <form method="POST">
            <div class="field">
                <label>Usuario</label>
                <input type="text" name="username" required>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">ACCEDER AL TERMINAL</button>
        </form>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
